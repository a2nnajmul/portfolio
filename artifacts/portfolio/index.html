    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Canonical -->
    <link rel="canonical" href="https://najmulalam.dev/" />

    <style>
      /* Critical CSS for preloader — inline to avoid render blocking */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #preloader.dark-bg {
        background: #1a1f2e;
      }
      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .preloader-ring {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(249, 115, 22, 0.2);
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-ring"></div>
    </div>
    <div id="root"></div>
    <script>
      // Dismiss preloader
      (function() {
        var loader = document.getElementById('preloader');
        // Match dark mode preference
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          loader.classList.add('dark-bg');
          document.documentElement.classList.add('dark');
        }
        function hide() {
          loader.classList.add('hidden');
          setTimeout(function() { loader.remove(); }, 500);
        }
        // Always hide after 2s max
        var t = setTimeout(hide, 2000);
        window.addEventListener('load', function() { clearTimeout(t); setTimeout(hide, 200); }, { once: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
